name: release-desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows exe
        if: runner.os == 'Windows'
        run: python -m PyInstaller --noconfirm --onefile --windowed --name VideoToText --paths src main.py

      - name: Build macOS app
        if: runner.os == 'macOS'
        run: python -m PyInstaller --noconfirm --windowed --name VideoToText --paths src main.py

      - name: Build Windows setup exe
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if (-not (Test-Path dist/VideoToText.exe)) {
            Write-Error "Windows exe not found"
          }
          $payload = Join-Path $PWD "installer_payload"
          New-Item -ItemType Directory -Force -Path $payload | Out-Null
          Copy-Item dist/VideoToText.exe (Join-Path $payload "VideoToText.exe")
          Copy-Item installer/install.cmd (Join-Path $payload "install.cmd")
          $target = Join-Path $PWD "VideoToText-windows-x64-setup.exe"
          $sed = @"
[Version]
Class=IEXPRESS
SEDVersion=3
[Options]
PackagePurpose=InstallApp
ShowInstallProgramWindow=1
HideExtractAnimation=0
UseLongFileName=1
InsideCompressed=0
CAB_FixedSize=0
CAB_ResvCodeSigning=0
RebootMode=N
InstallPrompt=
DisplayLicense=
FinishMessage=VideoToText installation completed.
TargetName=$target
FriendlyName=VideoToText Setup
AppLaunched=install.cmd
PostInstallCmd=<None>
AdminQuietInstCmd=install.cmd
UserQuietInstCmd=install.cmd
SourceFiles=SourceFiles
[Strings]
FILE0=VideoToText.exe
FILE1=install.cmd
[SourceFiles]
SourceFiles0=$payload
[SourceFiles0]
%FILE0%=
%FILE1%=
"@
          $sedPath = Join-Path $PWD "installer\VideoToText.sed"
          Set-Content -Path $sedPath -Value $sed -Encoding ASCII
          & "$env:SystemRoot\System32\iexpress.exe" /N $sedPath
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          if (-not (Test-Path $target)) {
            Write-Error "Windows setup exe not found"
          }
          Copy-Item dist/VideoToText.exe VideoToText-windows-x64.exe

      - name: Package macOS bundle
        if: runner.os == 'macOS'
        run: |
          if [ -d "dist/VideoToText.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent "dist/VideoToText.app" "VideoToText-macos-x64.zip"
          elif [ -f "dist/VideoToText" ]; then
            zip -j "VideoToText-macos-x64.zip" "dist/VideoToText"
          else
            echo "Build output not found" >&2
            exit 1
          fi

      - name: Upload Windows exe artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: VideoToText-windows-x64
          path: VideoToText-windows-x64.exe

      - name: Upload Windows setup artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: VideoToText-windows-x64-setup
          path: VideoToText-windows-x64-setup.exe

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: VideoToText-macos-x64
          path: VideoToText-macos-x64.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show release assets
        run: find release-assets -type f -maxdepth 3

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.exe
            release-assets/**/*.zip
          generate_release_notes: true
