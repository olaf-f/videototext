name: build-desktop-python

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app
        run: pyinstaller --noconfirm --windowed --name VideoToText --paths src main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoToText-${{ matrix.os }}
          path: dist/VideoToText*
