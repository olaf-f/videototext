name: release-desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows exe
        if: runner.os == 'Windows'
        run: python -m PyInstaller --noconfirm --onefile --windowed --name VideoToText --paths src main.py

      - name: Build macOS app
        if: runner.os == 'macOS'
        run: python -m PyInstaller --noconfirm --windowed --name VideoToText --paths src main.py

      - name: Build Windows setup exe
        if: runner.os == 'Windows'
        shell: powershell
        run: .\installer\build-setup.ps1 -RepoRoot $PWD

      - name: Normalize Windows release filenames
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Copy-Item .\dist\VideoToText.exe .\VideoToText-windows-x64.exe -Force
          if (-not (Test-Path .\VideoToText-windows-x64.exe)) { throw 'VideoToText-windows-x64.exe not found' }
          if (-not (Test-Path .\VideoToText-windows-x64-setup.exe)) { throw 'VideoToText-windows-x64-setup.exe not found' }

      - name: Inspect Windows outputs
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Get-ChildItem -Path $PWD
          Get-ChildItem -Path dist -ErrorAction SilentlyContinue

      - name: Package macOS bundle
        if: runner.os == 'macOS'
        run: |
          if [ -d "dist/VideoToText.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent "dist/VideoToText.app" "VideoToText-macos-x64.zip"
          elif [ -f "dist/VideoToText" ]; then
            zip -j "VideoToText-macos-x64.zip" "dist/VideoToText"
          else
            echo "Build output not found" >&2
            exit 1
          fi

      - name: Ensure GitHub Release Exists
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" --generate-notes --title "${GITHUB_REF_NAME}"

      - name: Upload Windows Release Assets
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "VideoToText-windows-x64.exe" \
            "VideoToText-windows-x64-setup.exe" \
            --clobber

      - name: Upload macOS Release Asset
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "VideoToText-macos-x64.zip" \
            --clobber
