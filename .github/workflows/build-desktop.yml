name: build-desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-portable:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portable Windows zip
        shell: pwsh
        run: ./scripts/package-portable.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartOCR-Pro-windows-portable
          path: release/portable/SmartOCR-Pro-windows-portable.zip
          if-no-files-found: error

      - name: Ensure GitHub Release Exists
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" --generate-notes --title "${GITHUB_REF_NAME}"

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "release/portable/SmartOCR-Pro-windows-portable.zip" \
            --clobber
