name: release-desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows exe
        if: runner.os == 'Windows'
        run: python -m PyInstaller --noconfirm --onefile --windowed --name VideoToText --paths src main.py

      - name: Build macOS app
        if: runner.os == 'macOS'
        run: python -m PyInstaller --noconfirm --windowed --name VideoToText --paths src main.py

      - name: Build Windows setup exe
        if: runner.os == 'Windows'
        shell: powershell
        run: .\installer\build-setup.ps1 -RepoRoot $PWD

      - name: Normalize Windows release filenames
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Copy-Item .\dist\VideoToText.exe .\VideoToText-windows-x64.exe -Force
          if (-not (Test-Path .\VideoToText-windows-x64.exe)) { throw 'VideoToText-windows-x64.exe not found' }
          if (-not (Test-Path .\VideoToText-windows-x64-setup.exe)) { throw 'VideoToText-windows-x64-setup.exe not found' }

      - name: Inspect Windows outputs
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Get-ChildItem -Path $PWD
          Get-ChildItem -Path dist -ErrorAction SilentlyContinue

      - name: Package macOS bundle
        if: runner.os == 'macOS'
        run: |
          if [ -d "dist/VideoToText.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent "dist/VideoToText.app" "VideoToText-macos-x64.zip"
          elif [ -f "dist/VideoToText" ]; then
            zip -j "VideoToText-macos-x64.zip" "dist/VideoToText"
          else
            echo "Build output not found" >&2
            exit 1
          fi

      - name: Upload Windows exe artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: VideoToText-windows-x64
          path: VideoToText-windows-x64.exe
          if-no-files-found: error

      - name: Upload Windows setup artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: VideoToText-windows-x64-setup
          path: VideoToText-windows-x64-setup.exe
          if-no-files-found: error

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: VideoToText-macos-x64
          path: VideoToText-macos-x64.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Show release assets
        run: find release-assets -maxdepth 3 -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/VideoToText-windows-x64.exe
            release-assets/VideoToText-windows-x64-setup.exe
            release-assets/VideoToText-macos-x64.zip
          generate_release_notes: true
