name: release-desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: VideoToText-windows-x64
            package_path: VideoToText-windows-x64.zip
          - os: macos-latest
            artifact_name: VideoToText-macos-x64
            package_path: VideoToText-macos-x64.zip
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app
        run: python -m PyInstaller --noconfirm --windowed --name VideoToText --paths src main.py

      - name: Package windows bundle
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if (Test-Path dist/VideoToText) {
            Compress-Archive -Path dist/VideoToText -DestinationPath VideoToText-windows-x64.zip -Force
          } elseif (Test-Path dist/VideoToText.exe) {
            Compress-Archive -Path dist/VideoToText.exe -DestinationPath VideoToText-windows-x64.zip -Force
          } else {
            Write-Error "Build output not found"
          }

      - name: Package macOS bundle
        if: runner.os == 'macOS'
        run: |
          if [ -d "dist/VideoToText.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent "dist/VideoToText.app" "VideoToText-macos-x64.zip"
          elif [ -f "dist/VideoToText" ]; then
            zip -j "VideoToText-macos-x64.zip" "dist/VideoToText"
          else
            echo "Build output not found" >&2
            exit 1
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_path }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show release assets
        run: find release-assets -type f -maxdepth 3

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.zip
          generate_release_notes: true
